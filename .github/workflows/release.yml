name: Release builds

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fuse-windows-x86_64.zip
            binary: target/x86_64-pc-windows-msvc/release/fuse.exe
            packed_binary: fuse.exe

          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fuse-linux-x86_64.zip
            binary: target/x86_64-unknown-linux-gnu/release/fuse
            packed_binary: fuse

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: fuse-macos-x86_64.zip
            binary: target/x86_64-apple-darwin/release/fuse
            packed_binary: fuse

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: fuse-macos-aarch64.zip
            binary: target/aarch64-apple-darwin/release/fuse
            packed_binary: fuse

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.packed_binary }}"
          cd dist
          7z a "../${{ matrix.artifact }}" "${{ matrix.packed_binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
